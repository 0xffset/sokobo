name: C++ Linux Build

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Show compiler version
        run: g++ --version

      - name: Clean project
        run: make clean || true

      - name: Build project
        run: make

      - name: Run tests
        run: make test